info:
  name: Upload Any Binary
  type: http
  seq: 4
  description: >
    Generic binary upload to POST /upload.
    The server accepts any Content-Type and returns metadata:
    actualBytes, contentType, and whether the Content-Length header
    matched the real body size.
    Start the demo server first: node examples/demo-api/server.js

http:
  method: POST
  url: "http://localhost:3456/upload"
  headers: []
  params: []
  body:
    type: file
    data:
      - filePath: fixtures/sample.png
        contentType: application/octet-stream
        selected: true

settings:
  encodeUrl: true
  timeout: 10000
  followRedirects: true
  maxRedirects: 5

runtime:
  assertions:
    - expression: res.status
      operator: equals
      value: "200"
    - expression: res.body.received
      operator: equals
      value: "true"
